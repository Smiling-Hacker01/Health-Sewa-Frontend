<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Plans | Health Sewa</title>
    <link rel="stylesheet" href="exercise.css">
</head>
<body>

<div class="container">
    <a href="./../HomePage/home.html" class="back-home-btn">&#8592; Back to Homepage</a>
    <h1>Workout Plans</h1>

    <!-- Workout Type -->
    <div class="workout-type">
        <button id="gym-btn" class="active-type">Gym Workout</button>
        <button id="home-btn">Home Workout</button>
    </div>

    <!-- Week Selector -->
    <div class="week-selector">
        <button class="week-btn active" data-week="week1">Week 1</button>
        <button class="week-btn" data-week="week2">Week 2</button>
        <button class="week-btn" data-week="week3">Week 3</button>
        <button class="week-btn" data-week="week4">Week 4</button>
    </div>

    <!-- Dynamic Workout Container -->
    <div id="workout-container" style="transition: opacity 0.15s ease-in-out;">
        <!-- Javascript will inject the daily workouts here -->
    </div>
</div>

<script src="exercise.js"></script>
</body>
</html>
