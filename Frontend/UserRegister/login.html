<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Sewa - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-wrapper">

        <!-- Left Panel — Branding -->
        <div class="left-panel">
            <div class="left-content">
                <div class="brand">
                    <span class="brand-icon">❤️</span>
                    <span class="brand-name">Health Sewa</span>
                </div>
                <h2>Connecting donors.<br>Saving lives.</h2>
                <p>Join thousands of people who are making a difference through blood donation and health awareness.</p>
                <div class="stats">
                    <div class="stat-item">
                        <strong>500+</strong>
                        <span>Donors</span>
                    </div>
                    <div class="stat-item">
                        <strong>200+</strong>
                        <span>Lives Saved</span>
                    </div>
                    <div class="stat-item">
                        <strong>50+</strong>
                        <span>Cities</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel — Login Form -->
        <div class="right-panel">
            <div class="form-container">
                <a href="./../HomePage/home.html" class="back-link">&#8592; Back to Home</a>

                <div class="form-header">
                    <h1>Welcome back</h1>
                    <p>Login to continue your journey</p>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="user-input" placeholder="you@example.com" name="email" id="email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrap">
                            <input type="password" class="user-input" placeholder="Enter your password" name="password" id="password" required>
                            <span class="toggle-pw" id="togglePw">👁️</span>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-label">
                            <input type="checkbox" id="remember-me">
                            <span>Remember me</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary" id="loginBtn">Login</button>
                    <button type="reset" class="btn-secondary">Reset</button>

                    <p class="register-link">Don't have an account? <a href="./signup.html">Register here</a></p>
                </form>
            </div>
        </div>

    </div>

    <script src="./login.js"></script>
</body>
</html>
